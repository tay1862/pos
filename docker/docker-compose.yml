version: '3.8'

services:
  # ----------------------------------------
  # API Service (NestJS)
  # ----------------------------------------
  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    image: kinsaep-pos-api:latest
    container_name: kinsaep_pos_api
    restart: unless-stopped
    ports:
      # Expose port to localhost only for nginx proxying (if nginx is running on host)
      # Or map to 3000 inside the docker network for the nginx container to access
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - APP_SECRET=${APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pos_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ----------------------------------------
  # Web Admin Service (Next.js) - Placeholder
  # ----------------------------------------
  # web-admin:
  #   build:
  #     context: ../
  #     dockerfile: apps/web-admin/Dockerfile
  #   image: kinsaep-pos-web:latest
  #   container_name: kinsaep_pos_web
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:3001:3000"
  #   environment:
  #     - NODE_ENV=production
  #     - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
  #   networks:
  #     - pos_network

  # ----------------------------------------
  # PostgreSQL Database
  # ----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: kinsaep_pos_db
    restart: unless-stopped
    # Do not expose to public, only internal network
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pos_db_data:/var/lib/postgresql/data
    networks:
      - pos_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Redis Cache / Message Broker
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kinsaep_pos_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - pos_redis_data:/data
    networks:
      - pos_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Nginx Reverse Proxy (Optional, if not using host nginx)
  # ----------------------------------------
  nginx:
    image: nginx:alpine
    container_name: kinsaep_pos_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - api
    networks:
      - pos_network

volumes:
  pos_db_data:
  pos_redis_data:

networks:
  pos_network:
    driver: bridge
